<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="dashboard">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h2>ADMIN</h2>
    <a href="#">Dashboard</a>
    <a href="#">Messages</a>
    <a href="#">Users</a>
    <a href="#">Settings</a>
  </div>

  <!-- MAIN -->
  <div class="main">

    <h1>Dashboard Overview</h1>

    <!-- STATS -->
    <div class="stats">

      <div class="card">
        <h3>Users</h3>
        <p>1,204</p>
      </div>

      <div class="card">
        <h3>Messages</h3>
        <p>8500</p>
      </div>

      <div class="card">
        <h3>Transactions</h3>
        <p>$4,600,000,000</p>
      </div>

    </div>

    <!-- MESSAGES -->
    <div class="messages">

      <h2>Recent Messages</h2>

      <div class="card">
        <p><strong>John:</strong> Interested in Model S</p>
      </div>

      <div class="card">
        <p><strong>Mary:</strong> Need pricing details</p>
      </div>

      <div class="card">
        <p><strong>Alex:</strong> Partnership inquiry</p>
      </div>

    </div>

  </div>

</div>

</body>
</html>
